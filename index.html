<style>
:root{--bg:#f7f6f2;--panel:#fff;--ink:#1c1b18;--muted:#6b6862;--line:#e7e4dc;
  --brand:#3b6e58;--brandink:#fff;--soft:#f0eee9;--hover:#f3f0fa;
  --shadow:0 8px 24px rgba(40,30,20,.07);
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
[data-theme="dark"]{--bg:#15131a;--panel:#1d1a24;--ink:#ece8f1;--muted:#a49db4;--line:#322c3c;
  --soft:#241f2e;--hover:#262031;--brandink:#fff;--shadow:0 8px 24px rgba(0,0,0,.4)}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;font-family:var(--sans);color:var(--ink);background:var(--bg);line-height:1.6;-webkit-text-size-adjust:100%}
a{color:var(--brand)}
header{position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--bg) 92%,transparent);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.hd{max-width:1100px;margin:0 auto;padding:10px 16px;display:flex;align-items:center;gap:12px}
.logo{width:38px;height:38px;border-radius:9px;display:grid;place-items:center;font-size:19px;background:var(--brand);color:#fff;flex:0 0 auto;border:none;cursor:pointer;padding:0}
.ttl b{font-size:16px;font-weight:800;display:block;line-height:1.1}
.ttl span{font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted)}
.hd .sp{flex:1}
.search{width:min(340px,42vw);font:inherit;font-size:14px;color:var(--ink);background:var(--panel);border:1.5px solid var(--line);border-radius:10px;padding:9px 13px}
.search:focus{outline:none;border-color:var(--brand)}
.iconbtn{background:var(--panel);border:1.5px solid var(--line);color:var(--ink);border-radius:10px;width:38px;height:38px;font-size:16px;cursor:pointer;flex:0 0 auto}
.menubtn{display:none}
.shell{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:280px 1fr;gap:0}
aside{border-right:1px solid var(--line);padding:18px 10px 60px;height:calc(100vh - 58px);overflow:auto;position:sticky;top:58px}
.cat{margin-bottom:4px}
.cat>.catname{display:flex;align-items:center;gap:7px;width:100%;text-align:left;font:inherit;font-weight:700;font-size:14px;color:var(--ink);
  background:none;border:none;cursor:pointer;padding:8px 10px;border-radius:8px}
.cat>.catname:hover{background:var(--soft)}
.cat>.catname .tw{margin-left:auto;color:var(--muted);font-size:11px;transition:.15s}
.cat.collapsed .children{display:none}
.cat.collapsed .tw{transform:rotate(-90deg)}
.children{padding-left:6px}
.subname{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);padding:8px 10px 3px}
.alink{display:block;font:inherit;text-align:left;width:100%;background:none;border:none;color:var(--ink);cursor:pointer;
  padding:6px 10px 6px 22px;border-radius:7px;font-size:13.5px;line-height:1.35}
.alink:hover{background:var(--soft)}
.alink.active{background:var(--brand);color:var(--brandink);font-weight:600}
main{padding:26px 30px 80px;min-width:0;max-width:780px}
.crumb{font-size:12.5px;color:var(--muted);margin-bottom:6px}
.art h1{font-size:30px;margin:0 0 14px;line-height:1.15;font-weight:800}
.art h2{font-size:21px;margin:26px 0 8px}
.art h3{font-size:17px;margin:20px 0 6px}
.art p{margin:0 0 13px}
.art ul{margin:0 0 13px;padding-left:20px}.art li{margin-bottom:5px}
.art a.ilink{color:var(--brand);text-decoration:none;border-bottom:1px solid color-mix(in srgb,var(--brand) 35%,transparent);cursor:pointer}
.art a.ilink:hover{border-bottom-color:var(--brand)}
.lead{font-size:16.5px;color:var(--ink)}
.box{background:var(--soft);border:1px solid var(--line);border-left:4px solid var(--brand);border-radius:12px;padding:12px 16px;margin:14px 0;font-size:14.5px}
.seealso{margin-top:26px;border-top:1px solid var(--line);padding-top:14px}
.seealso b{font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.seealso .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.seealso .chips a{font-size:13px;background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:5px 12px;text-decoration:none;color:var(--brand)}
.aromaframe{width:100%;height:72vh;border:1px solid var(--line);border-radius:12px;background:var(--panel)}
.results .alink{padding-left:10px}
.sidebackdrop{display:none}
@media(max-width:820px){
 .hd{padding-top:calc(env(safe-area-inset-top) + 22px);padding-bottom:12px}
 .iconbtn,.menubtn{width:44px;height:44px;font-size:18px}
 .shell{grid-template-columns:1fr}
 aside{position:fixed;top:0;left:0;bottom:0;width:280px;height:100vh;z-index:40;background:var(--panel);transform:translateX(-105%);transition:.25s;padding-top:16px}
 aside.open{transform:none}
 .sidebackdrop.open{display:block;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:35}
 .menubtn{display:grid;place-items:center}
 main{padding:20px 16px 70px}
 .search{width:auto;flex:1}
 .ttl{display:none}
}
</style>

<script>
const APP={"title":"Weltliteratur","brand":"Welt<b>literatur</b>","color":"#7a3b2e","ic":"📚","articles":[{"slug":"ueberblick","title":"Überblick & Epochen","crumb":"Grundlagen","body":"<p>Dieses Nachschlagewerk begleitet die Lernkarten-App zur <b>Weltliteratur</b>. Es bündelt Kurzporträts wichtiger Werke, ihrer Autorinnen und Autoren sowie ihrer literaturgeschichtlichen Einordnung – von der frühen Neuzeit bis zur Gegenwart.</p><p>Grobe Orientierung: <b>Sturm und Drang</b> (Gefühl, Genie, ~1770er), <b>Weimarer Klassik</b> (Harmonie, Humanität, um 1800), <b>Realismus</b> (19. Jh.), <b>Moderne</b> (Brüche, neue Erzählformen, ab ~1900) und <b>Gegenwart</b>. Alle Texte sind eigenständig formuliert; es werden keine Originalzitate wiedergegeben.</p>"},{"slug":"faust","title":"Faust I","crumb":"Werke › Deutschland","body":"<p><b>Faust I</b> (1808) von <a class='ilink' data-s='goethe'>Goethe</a> gilt als das zentrale Drama der deutschen Literatur. Der Gelehrte Faust verzweifelt an den Grenzen des Wissens und schließt eine Wette mit dem Teufel Mephisto: Verliert er sich je an einen Augenblick, ist seine Seele verwirkt.</p><p>Im Zentrum steht die <b>Gretchentragödie</b>: Faust verführt das Bürgermädchen Margarete und stürzt es ins Unglück. Das Drama verhandelt das <b>faustische Streben</b>, den Zwiespalt der 'zwei Seelen', Schuld und Erlösung. Aus ihm stammen geflügelte Worte wie 'Gretchenfrage' und 'des Pudels Kern'.</p>"},{"slug":"werther","title":"Die Leiden des jungen Werther","crumb":"Werke › Deutschland","body":"<p>Der Briefroman <b>Die Leiden des jungen Werther</b> (1774) machte <a class='ilink' data-s='goethe'>Goethe</a> mit 24 Jahren europaweit berühmt. Der empfindsame Werther liebt die verlobte Lotte, verzweifelt an dieser aussichtslosen Leidenschaft und nimmt sich das Leben.</p><p>Als Schlüsseltext des <b>Sturm und Drang</b> stellt er Gefühl über Konvention und kritisiert starre Standesschranken. Der Roman löste ein 'Werther-Fieber' und eine Welle von Nachahmungen aus – der sogenannte <b>Werther-Effekt</b>.</p>"},{"slug":"verwandlung","title":"Die Verwandlung","crumb":"Werke › Moderne","body":"<p>In <a class='ilink' data-s='kafka'>Kafkas</a> Erzählung <b>Die Verwandlung</b> (1915) erwacht Gregor Samsa als riesiges Ungeziefer. Ohne dass je eine Ursache genannt wird, wird er von seiner Familie zunehmend verstoßen und stirbt vereinsamt.</p><p>Die Parabel lässt sich als Bild der <b>Entfremdung</b> lesen: Verliert Gregor seine Nützlichkeit als Ernährer, verliert er Wert und Menschlichkeit. Der beklemmend-absurde Ton prägte den Begriff <b>kafkaesk</b>.</p>"},{"slug":"prozess","title":"Der Prozess","crumb":"Werke › Moderne","body":"<p>In <a class='ilink' data-s='kafka'>Kafkas</a> postum (1925) erschienenem Roman <b>Der Prozess</b> wird Josef K. ohne Nennung eines Vergehens verhaftet und in ein undurchschaubares Gerichtsverfahren verstrickt. Am Ende wird er hingerichtet.</p><p>Der Roman steht für die Ohnmacht des Einzelnen gegenüber einer anonymen, sinnentleerten <b>Bürokratie</b> und für eine diffuse, unfassbare Schuld. Die eingelagerte <b>Türhüterlegende</b> deutet den versperrten Zugang zu letzter Wahrheit an.</p>"},{"slug":"buddenbrooks","title":"Buddenbrooks","crumb":"Werke › Deutschland","body":"<p><b>Buddenbrooks</b> (1901) ist der Debütroman von <b>Thomas Mann</b> und schildert den 'Verfall einer Familie' – den Niedergang einer Lübecker Kaufmannsdynastie über vier Generationen. Für dieses Werk erhielt Mann später den Nobelpreis.</p><p>Der Roman verbindet realistische Gesellschaftschronik mit dem Motiv, dass wachsende Sensibilität und Künstlertum die praktische Lebenstüchtigkeit untergraben. (In der Lernkarten-App als Erweiterung vorgesehen.)</p>"},{"slug":"schuld-und-suehne","title":"Schuld und Sühne","crumb":"Werke › Russland","body":"<p>In <a class='ilink' data-s='dostojewski'>Dostojewskis</a> <b>Schuld und Sühne</b> (1866) ermordet der Student Raskolnikow eine Pfandleiherin, um seine Theorie vom 'außergewöhnlichen Menschen' zu beweisen, der über der Moral stehe. Die Tat zerstört ihn seelisch.</p><p>Erst durch Geständnis und die Liebe der gläubigen Sonja findet er einen Weg zur Umkehr. Der Roman ist ein Meilenstein des <b>psychologischen Erzählens</b> und ein eindringliches Argument gegen die These, ein höherer Zweck rechtfertige jedes Mittel.</p>"},{"slug":"stolz-und-vorurteil","title":"Stolz und Vorurteil","crumb":"Werke › England","body":"<p><b>Stolz und Vorurteil</b> (1813) von <a class='ilink' data-s='austen'>Jane Austen</a> erzählt, wie die kluge Elizabeth Bennet und der vornehme Mr. Darcy ihre gegenseitigen Vorurteile überwinden. Feine Ironie trifft auf scharfe Gesellschaftsbeobachtung.</p><p>Der Roman kritisiert die ökonomische Zwangslage der Frauen und die Verengung der Ehe auf Geld und Stand. Elizabeth beansprucht Urteilskraft und die Wahl aus Liebe – eine für ihre Zeit erstaunlich moderne Figur.</p>"},{"slug":"1984","title":"1984","crumb":"Werke › Dystopie","body":"<p><b>1984</b> (1949) von <a class='ilink' data-s='orwell'>George Orwell</a> entwirft den totalitären Überwachungsstaat Ozeanien unter dem 'Großen Bruder'. Winston Smith lehnt sich innerlich auf, wird gefoltert und schließlich gebrochen.</p><p>Der Roman prägte Begriffe wie <b>Big Brother</b>, <b>Neusprech</b> und <b>Doppeldenk</b>. Er warnt vor Massenüberwachung, Sprach- und Gedankenkontrolle sowie der Manipulation der Vergangenheit – gegen jede Form totalitärer Herrschaft.</p>"},{"slug":"der-fremde","title":"Der Fremde","crumb":"Werke › Moderne","body":"<p><b>Der Fremde</b> (1942) von <a class='ilink' data-s='camus'>Albert Camus</a> schildert den teilnahmslosen Meursault, der am Strand von Algier fast ohne Motiv einen Mann erschießt. Im Prozess wird ihm vor allem seine Gefühlskälte zum Verhängnis.</p><p>Der Roman ist ein Schlüsseltext der Philosophie des <b>Absurden</b>: des Widerspruchs zwischen menschlichem Sinnverlangen und einer gleichgültigen Welt. Meursault findet Freiheit erst, indem er diese 'zärtliche Gleichgültigkeit' annimmt.</p>"},{"slug":"goethe","title":"Johann Wolfgang von Goethe","crumb":"Autoren","body":"<p><b>Johann Wolfgang von Goethe</b> (1749–1832) ist der bedeutendste deutsche Dichter. Er wirkte am Hof von Weimar und prägte mit Schiller die <b>Weimarer Klassik</b>. Sein Werk reicht vom stürmischen <a class='ilink' data-s='werther'>Werther</a> bis zum <a class='ilink' data-s='faust'>Faust</a>, an dem er über 60 Jahre arbeitete.</p>"},{"slug":"kafka","title":"Franz Kafka","crumb":"Autoren","body":"<p><b>Franz Kafka</b> (1883–1924) aus dem deutschsprachig-jüdischen Prag ist einer der einflussreichsten Autoren der Moderne. Hauptberuflich Versicherungsjurist, schrieb er <a class='ilink' data-s='verwandlung'>Die Verwandlung</a> und <a class='ilink' data-s='prozess'>Der Prozess</a>. Seine unabgeschlossenen, beklemmenden Texte prägten den Begriff 'kafkaesk'.</p>"},{"slug":"dostojewski","title":"Fjodor M. Dostojewski","crumb":"Autoren","body":"<p><b>Fjodor M. Dostojewski</b> (1821–1881) gilt als Meister des psychologischen Romans. Von einer Scheinhinrichtung und sibirischer Verbannung geprägt, kreist sein Werk um Schuld, Glaube und Freiheit. Neben <a class='ilink' data-s='schuld-und-suehne'>Schuld und Sühne</a> schrieb er 'Die Brüder Karamasow' und 'Der Idiot'.</p>"},{"slug":"austen","title":"Jane Austen","crumb":"Autoren","body":"<p><b>Jane Austen</b> (1775–1817) schrieb ironische Gesellschaftsromane des englischen Landadels. Zu Lebzeiten anonym veröffentlicht, gilt sie heute als Klassikerin der Weltliteratur. Neben <a class='ilink' data-s='stolz-und-vorurteil'>Stolz und Vorurteil</a> verfasste sie 'Emma' und 'Verstand und Gefühl'.</p>"},{"slug":"orwell","title":"George Orwell","crumb":"Autoren","body":"<p><b>George Orwell</b> (1903–1950), eigentlich Eric Arthur Blair, war britischer Autor und Journalist mit antitotalitärer Haltung. Neben <a class='ilink' data-s='1984'>1984</a> schrieb er die Stalinismus-Satire 'Farm der Tiere'. Sein Name wurde zum Adjektiv 'orwellsch' für Überwachung und Propaganda.</p>"},{"slug":"camus","title":"Albert Camus","crumb":"Autoren","body":"<p><b>Albert Camus</b> (1913–1960), in Algerien aufgewachsen, erhielt 1957 den Literaturnobelpreis. Sein Denken kreist um das <b>Absurde</b> und die <b>Revolte</b>. Neben <a class='ilink' data-s='der-fremde'>Der Fremde</a> schrieb er den Essay 'Der Mythos des Sisyphos'.</p>"},{"slug":"zauberberg","title":"Der Zauberberg","crumb":"Werke › Deutschland","body":"<p><b>Der Zauberberg</b> (1924) von <a class='ilink' data-s='thomas-mann'>Thomas Mann</a> spielt in einem Davoser Lungensanatorium, in dem der junge Hans Castorp aus einem kurzen Besuch sieben Jahre werden lässt. Fern dem 'Flachland' gerät er in existenzielle Erfahrungen und geistige Debatten.</p><p>Der Roman ist ein 'Zeitroman': Die Kontrahenten Settembrini (Humanismus, Aufklärung) und Naphta (Radikalismus, Todesfaszination) verkörpern die geistigen Kräfte Europas vor dem Ersten Weltkrieg. Zeit, Krankheit und Tod werden zu zentralen Themen.</p>"},{"slug":"effi-briest","title":"Effi Briest","crumb":"Werke › Deutschland","body":"<p><b>Effi Briest</b> (1895) von <a class='ilink' data-s='fontane'>Theodor Fontane</a> ist ein Hauptwerk des deutschen Realismus. Die junge Effi wird mit dem viel älteren Baron von Innstetten verheiratet und lässt sich aus Langeweile auf eine kurze Affäre ein.</p><p>Jahre später entdeckt Innstetten alte Briefe und zerstört aus starrer Ehr- und Prinzipientreue beide Leben. Der Roman kritisiert leise, aber scharf den preußischen Konventionskodex, der Menschlichkeit dem Ansehen opfert. Er gehört zu den großen europäischen Ehebruchromanen.</p>"},{"slug":"blechtrommel","title":"Die Blechtrommel","crumb":"Werke › Moderne","body":"<p><b>Die Blechtrommel</b> (1959) von <a class='ilink' data-s='grass'>Günter Grass</a> ist ein Meilenstein der Nachkriegsliteratur. Oskar Matzerath beschließt mit drei Jahren, nicht mehr zu wachsen, und erzählt aus einer Anstalt sein Leben im Danzig der NS- und Nachkriegszeit.</p><p>Die groteske, magisch-realistische Erzählweise entlarvt die Verdrängung und Mitläuferschaft des Kleinbürgertums. Volker Schlöndorffs Verfilmung gewann 1979 Oscar und Goldene Palme.</p>"},{"slug":"don-quijote","title":"Don Quijote","crumb":"Werke › Weltliteratur","body":"<p><b>Don Quijote</b> (1605/1615) von <a class='ilink' data-s='cervantes'>Miguel de Cervantes</a> gilt oft als erster moderner Roman. Ein Landadliger verliert über Ritterromanen den Verstand, zieht als fahrender Ritter aus und kämpft berühmt gegen Windmühlen.</p><p>Der Gegensatz zwischen dem Idealisten Don Quijote und seinem realistischen Knappen Sancho Pansa wurde zum Grundmuster der Weltliteratur. Der Roman spielt vielschichtig mit Fiktion und Wirklichkeit und ist zugleich komisch und tief menschlich.</p>"},{"slug":"anna-karenina","title":"Anna Karenina","crumb":"Werke › Weltliteratur","body":"<p><b>Anna Karenina</b> (1877) von <a class='ilink' data-s='tolstoi'>Lew Tolstoi</a> erzählt, wie die verheiratete Anna für ihre Liebe zu Wronski mit Ehe und Gesellschaft bricht – mit tragischem Ende. Parallel steht die Sinnsuche des Gutsbesitzers Lewin.</p><p>Der Roman entlarvt die Heuchelei der Oberschicht und kontrastiert Annas selbstzerstörerische Leidenschaft mit Lewins mühsamer, aber sinnstiftender Existenz. Er gilt vielen als einer der größten Romane überhaupt.</p>"},{"slug":"madame-bovary","title":"Madame Bovary","crumb":"Werke › Weltliteratur","body":"<p><b>Madame Bovary</b> (1857) von <a class='ilink' data-s='flaubert'>Gustave Flaubert</a> gilt als Gründungswerk des modernen Realismus. Die Arztgattin Emma flüchtet aus der Enge der Provinz in Affären und Luxus, überschuldet sich und nimmt sich das Leben.</p><p>Der Begriff <b>Bovarysmus</b> bezeichnet die an Kitschidealen genährte Realitätsflucht. Flauberts kühle, ironische und stilistisch perfekte Erzählweise prägte den modernen Roman.</p>"},{"slug":"homo-faber","title":"Homo faber","crumb":"Werke › Deutschland","body":"<p><b>Homo faber</b> (1957) von <a class='ilink' data-s='max-frisch'>Max Frisch</a> zeigt den technikgläubigen Ingenieur Walter Faber, der Schicksal und Gefühl leugnet. Auf einer Reise verliebt er sich unwissentlich in seine eigene Tochter – eine tragische Verkettung, die seinen Rationalismus zerbricht.</p><p>Der Roman kritisiert das einseitig technisch-rationale Weltbild: Ausgerechnet die geleugnete 'Fügung' holt Faber ein. Anklänge an den Ödipus-Mythos unterlegen die moderne Handlung.</p>"},{"slug":"thomas-mann","title":"Thomas Mann","crumb":"Autoren","body":"<p><b>Thomas Mann</b> (1875–1955) aus Lübeck ist einer der bedeutendsten deutschen Erzähler; 1929 erhielt er den Nobelpreis. Sein Grundthema ist der Gegensatz von 'Bürger' und 'Künstler'. Zu seinen Werken zählen <a class='ilink' data-s='buddenbrooks'>Buddenbrooks</a> und <a class='ilink' data-s='zauberberg'>Der Zauberberg</a>.</p>"},{"slug":"fontane","title":"Theodor Fontane","crumb":"Autoren","body":"<p><b>Theodor Fontane</b> (1819–1898) gilt als bedeutendster deutscher Vertreter des poetischen Realismus und Meister des Gesellschaftsromans. Sein bekanntestes Werk ist <a class='ilink' data-s='effi-briest'>Effi Briest</a>; berühmt sind auch die 'Wanderungen durch die Mark Brandenburg'.</p>"},{"slug":"grass","title":"Günter Grass","crumb":"Autoren","body":"<p><b>Günter Grass</b> (1927–2015) war ein streitbarer, politisch engagierter Schriftsteller und Nobelpreisträger (1999). Sein Welterfolg <a class='ilink' data-s='blechtrommel'>Die Blechtrommel</a> eröffnet die 'Danziger Trilogie'. Umstritten war sein spätes Eingeständnis der Waffen-SS-Mitgliedschaft.</p>"},{"slug":"cervantes","title":"Miguel de Cervantes","crumb":"Autoren","body":"<p><b>Miguel de Cervantes</b> (1547–1616) ist der bedeutendste Schriftsteller der spanischen Literatur. Sein <a class='ilink' data-s='don-quijote'>Don Quijote</a> gilt als erster moderner Roman. Cervantes war Soldat, wurde bei Lepanto verwundet und geriet in algerische Gefangenschaft.</p>"},{"slug":"tolstoi","title":"Lew Tolstoi","crumb":"Autoren","body":"<p><b>Lew Tolstoi</b> (1828–1910) ist neben <a class='ilink' data-s='dostojewski'>Dostojewski</a> der größte russische Romancier. Seine Hauptwerke <a class='ilink' data-s='anna-karenina'>Anna Karenina</a> und 'Krieg und Frieden' verbinden epische Breite mit psychologischer Tiefe. Sein Spätwerk ist von moralisch-religiöser Wende geprägt.</p>"},{"slug":"flaubert","title":"Gustave Flaubert","crumb":"Autoren","body":"<p><b>Gustave Flaubert</b> (1821–1880) war ein französischer Erzähler und fanatischer Stilperfektionist ('le mot juste'). Sein <a class='ilink' data-s='madame-bovary'>Madame Bovary</a> begründete den modernen Realismus; die kühle, ironische Erzählhaltung prägte den modernen Roman.</p>"},{"slug":"max-frisch","title":"Max Frisch","crumb":"Autoren","body":"<p><b>Max Frisch</b> (1911–1991) war neben Dürrenmatt der wichtigste Schweizer Schriftsteller der Nachkriegszeit. Er kreist um Identität, Rollenzwang und die Grenzen des technisch-rationalen Weltbilds. Bekannt sind <a class='ilink' data-s='homo-faber'>Homo faber</a>, 'Stiller' und das Drama 'Andorra'.</p>"},{"slug":"krieg-und-frieden","title":"Krieg und Frieden","crumb":"Werke › Weltliteratur","body":"<p><b>Krieg und Frieden</b> (1869) von <a class='ilink' data-s='tolstoi'>Lew Tolstoi</a> ist ein monumentales Epos über mehrere Adelsfamilien während der Napoleonischen Kriege. Im Zentrum stehen Pierre Besuchow, Fürst Andrei und Natascha Rostowa.</p><p>Tolstoi verbindet Gesellschaftspanorama, Schlachtendarstellung und Geschichtsphilosophie: Nicht 'große Männer' wie Napoleon, sondern die Summe unzähliger Handlungen bestimme die Geschichte. Der Roman gilt als eines der größten Werke der Weltliteratur.</p>"},{"slug":"der-grosse-gatsby","title":"Der große Gatsby","crumb":"Werke › Weltliteratur","body":"<p><b>Der große Gatsby</b> (1925) von <a class='ilink' data-s='fitzgerald'>F. Scott Fitzgerald</a> spielt im Jazz-Zeitalter der 1920er. Der geheimnisvolle Millionär Jay Gatsby verehrt die verheiratete Daisy und träumt davon, die Vergangenheit zurückzuholen – vergeblich und tödlich.</p><p>Der Roman ist eine große Parabel auf den hohlen 'amerikanischen Traum'; das grüne Licht an Daisys Steg symbolisiert die stets zurückweichende Sehnsucht. Heute gilt er als einer der bedeutendsten US-Romane.</p>"},{"slug":"tod-in-venedig","title":"Der Tod in Venedig","crumb":"Werke › Deutschland","body":"<p><b>Der Tod in Venedig</b> (1912) von <a class='ilink' data-s='thomas-mann'>Thomas Mann</a> erzählt, wie der disziplinierte Schriftsteller Aschenbach in Venedig einer Faszination für den schönen Knaben Tadzio verfällt und, unfähig sich zu lösen, während einer Cholera-Epidemie stirbt.</p><p>Die Novelle verhandelt den Zusammenbruch apollinischer Ordnung durch das dionysisch-Rauschhafte und die Zweideutigkeit der Schönheit, die erhaben und todbringend zugleich ist.</p>"},{"slug":"steppenwolf","title":"Der Steppenwolf","crumb":"Werke › Deutschland","body":"<p><b>Der Steppenwolf</b> (1927) von <a class='ilink' data-s='hesse'>Hermann Hesse</a> zeigt Harry Haller, der sich zwischen Bürgerlichkeit und wilder Einsamkeit zerrissen fühlt. Ein 'Magisches Theater' konfrontiert ihn mit der Vielfalt seiner Seele.</p><p>Der Roman kritisiert das simple 'Wolf-und-Bürger'-Selbstbild: Der Mensch besteht aus vielen Seelen. Er wurde später zum Kultbuch der Gegenkultur.</p>"},{"slug":"die-raeuber","title":"Die Räuber","crumb":"Werke › Deutschland","body":"<p><b>Die Räuber</b> (1781) von <a class='ilink' data-s='schiller'>Friedrich Schiller</a> ist ein Fanal des Sturm und Drang. Durch die Intrige seines Bruders Franz verstoßen, wird der idealistische Karl Moor zum Räuberhauptmann.</p><p>Das rebellische Drama richtet sich gegen Tyrannei und Ungerechtigkeit, zeigt aber auch, dass Selbstjustiz neues Unrecht schafft. Es begründete Schillers Ruhm als 'Dichter der Freiheit'.</p>"},{"slug":"im-westen-nichts-neues","title":"Im Westen nichts Neues","crumb":"Werke › Deutschland","body":"<p><b>Im Westen nichts Neues</b> (1929) von <a class='ilink' data-s='remarque'>Erich Maria Remarque</a> schildert aus Sicht des jungen Soldaten Paul Bäumer das Grauen des Ersten Weltkriegs und den Untergang einer ganzen Generation.</p><p>Der nüchtern-erschütternde Antikriegsroman wurde ein weltweiter Bestseller und von den Nationalsozialisten verboten und verbrannt.</p>"},{"slug":"das-parfum","title":"Das Parfum","crumb":"Werke › Deutschland","body":"<p><b>Das Parfum</b> (1985) von <a class='ilink' data-s='sueskind'>Patrick Süskind</a> erzählt von Jean-Baptiste Grenouille, der mit genialem Geruchssinn, aber ohne eigenen Körpergeruch geboren wird und zum Mörder wird, um den vollkommenen Duft zu schaffen.</p><p>Der Roman verbindet historischen Roman, Kriminalgeschichte und Parabel über Genie, Identität und die Macht, Gefühle künstlich zu erzeugen. Er wurde ein internationaler Welterfolg.</p>"},{"slug":"hesse","title":"Hermann Hesse","crumb":"Autoren","body":"<p><b>Hermann Hesse</b> (1877–1962) war ein deutsch-schweizerischer Autor und Nobelpreisträger (1946). Seine Romane kreisen um Sinnsuche und Selbstwerdung. Neben <a class='ilink' data-s='steppenwolf'>Der Steppenwolf</a> schrieb er 'Siddhartha', 'Demian' und 'Das Glasperlenspiel'.</p>"},{"slug":"schiller","title":"Friedrich Schiller","crumb":"Autoren","body":"<p><b>Friedrich Schiller</b> (1759–1805) ist neben <a class='ilink' data-s='goethe'>Goethe</a> der wichtigste Dichter der Weimarer Klassik und gilt als 'Dichter der Freiheit'. Sein Frühwerk <a class='ilink' data-s='die-raeuber'>Die Räuber</a> gehört zum Sturm und Drang; berühmt sind auch 'Kabale und Liebe', 'Wallenstein' und 'Wilhelm Tell'.</p>"},{"slug":"fitzgerald","title":"F. Scott Fitzgerald","crumb":"Autoren","body":"<p><b>F. Scott Fitzgerald</b> (1896–1940) war der literarische Chronist des amerikanischen 'Jazz Age'. Sein Meisterwerk <a class='ilink' data-s='der-grosse-gatsby'>Der große Gatsby</a> wurde erst nach seinem Tod zum Klassiker der US-Literatur.</p>"},{"slug":"remarque","title":"Erich Maria Remarque","crumb":"Autoren","body":"<p><b>Erich Maria Remarque</b> (1898–1970) wurde mit dem Antikriegsroman <a class='ilink' data-s='im-westen-nichts-neues'>Im Westen nichts Neues</a> weltberühmt. Von den Nationalsozialisten verfemt, emigrierte er; seine Bücher wurden verbrannt.</p>"},{"slug":"sueskind","title":"Patrick Süskind","crumb":"Autoren","body":"<p><b>Patrick Süskind</b> (*1949) ist ein öffentlichkeitsscheuer deutscher Autor. Sein Roman <a class='ilink' data-s='das-parfum'>Das Parfum</a> wurde zu einem der international erfolgreichsten deutschen Nachkriegsromane.</p>"},{"slug":"odyssee","title":"Die Odyssee","crumb":"Werke › Weltliteratur","body":"<p><b>Die Odyssee</b> von <a class='ilink' data-s='homer'>Homer</a> (um 700 v. Chr.) schildert die zehnjährige Heimkehr des listenreichen Odysseus vom Trojanischen Krieg. Auf seiner Irrfahrt besteht er Abenteuer mit dem Zyklopen Polyphem, den Sirenen, Kirke und Kalypso.</p><p>Das Epos gilt als Urbild der Reise- und Abenteuererzählung; Odysseus verkörpert den durch Klugheit und List überlebenden Menschen. Redewendungen wie 'zwischen Skylla und Charybdis' stammen daraus.</p>"},{"slug":"hamlet","title":"Hamlet","crumb":"Werke › Weltliteratur","body":"<p><b>Hamlet</b> (um 1601) von <a class='ilink' data-s='shakespeare'>William Shakespeare</a> ist das wohl berühmteste Drama der Weltliteratur. Prinz Hamlet soll den Mord an seinem Vater durch den Onkel Claudius rächen, zaudert aber im Zweifel – bis fast alle Hauptfiguren tot sind.</p><p>Der Monolog 'Sein oder Nichtsein' und der 'Hamlet-Konflikt' (Grübeln gegen Handeln) machten die Figur zum Sinnbild des reflektierenden, zerrissenen modernen Menschen.</p>"},{"slug":"goettliche-komoedie","title":"Die Göttliche Komödie","crumb":"Werke › Weltliteratur","body":"<p><b>Die Göttliche Komödie</b> (um 1320) von <a class='ilink' data-s='dante'>Dante Alighieri</a> schildert eine Jenseitsreise durch Hölle, Läuterungsberg und Paradies, geführt von Vergil und Beatrice.</p><p>Dante schrieb sie in italienischer Volkssprache und begründete damit die italienische Literatur. Allegorisch ist sie der Weg der Seele von der Sünde zur Gottesschau.</p>"},{"slug":"frankenstein","title":"Frankenstein","crumb":"Werke › Weltliteratur","body":"<p><b>Frankenstein</b> (1818) von <a class='ilink' data-s='mary-shelley'>Mary Shelley</a> erzählt, wie der Wissenschaftler Victor Frankenstein künstliches Leben erschafft, es aber verstößt – worauf das einsame Geschöpf zum Rächer wird.</p><p>Der Untertitel 'Der moderne Prometheus' verweist auf die Anmaßung göttlicher Schöpfermacht. Der Roman gilt als Urwerk der Science-Fiction und als Warnung vor Wissenschaft ohne Verantwortung.</p>"},{"slug":"der-vorleser","title":"Der Vorleser","crumb":"Werke › Deutschland","body":"<p><b>Der Vorleser</b> (1995) von <a class='ilink' data-s='schlink'>Bernhard Schlink</a> erzählt von der Affäre des jungen Michael mit der älteren Hanna, die er später als Angeklagte in einem NS-Kriegsverbrecherprozess wiedersieht. Ihr Geheimnis: Sie ist Analphabetin.</p><p>Der Roman verhandelt Schuld, Scham und das Verhältnis der 'zweiten Generation' zur NS-Vergangenheit – vielgelesen und zugleich wegen möglicher Relativierung der Täterschaft umstritten.</p>"},{"slug":"homer","title":"Homer","crumb":"Autoren","body":"<p><b>Homer</b> ist der legendäre griechische Dichter (um 8. Jh. v. Chr.), dem die beiden großen Epen <a class='ilink' data-s='odyssee'>Odyssee</a> und 'Ilias' zugeschrieben werden. Sie stehen am Anfang der abendländischen Literatur; Homers historische Existenz ist ungewiss.</p>"},{"slug":"shakespeare","title":"William Shakespeare","crumb":"Autoren","body":"<p><b>William Shakespeare</b> (1564–1616) gilt als bedeutendster Dramatiker der englischen Sprache. Neben <a class='ilink' data-s='hamlet'>Hamlet</a> schrieb er 'Romeo und Julia', 'Macbeth', 'König Lear' und 'Othello' sowie zahlreiche Sonette.</p>"},{"slug":"dante","title":"Dante Alighieri","crumb":"Autoren","body":"<p><b>Dante Alighieri</b> (1265–1321) war ein florentinischer Dichter, der im politischen Exil die <a class='ilink' data-s='goettliche-komoedie'>Göttliche Komödie</a> schrieb. Als 'Vater der italienischen Sprache' begründete er die Literatur in der Volkssprache.</p>"},{"slug":"mary-shelley","title":"Mary Shelley","crumb":"Autoren","body":"<p><b>Mary Shelley</b> (1797–1851) schrieb mit nur 18 Jahren <a class='ilink' data-s='frankenstein'>Frankenstein</a>, das Urwerk der Science-Fiction. Sie war Teil des englischen Romantiker-Kreises um ihren Mann Percy B. Shelley und Lord Byron.</p>"},{"slug":"schlink","title":"Bernhard Schlink","crumb":"Autoren","body":"<p><b>Bernhard Schlink</b> (*1944) ist ein deutscher Jurist und Schriftsteller. Sein Roman <a class='ilink' data-s='der-vorleser'>Der Vorleser</a> wurde ein internationaler Bestseller und 2008 erfolgreich verfilmt.</p>"},{"slug":"ulysses","title":"Ulysses","crumb":"Werke › Weltliteratur","body":"<p><b>Ulysses</b> (1922) von <a class='ilink' data-s='joyce'>James Joyce</a> schildert einen einzigen Tag (16. Juni 1904) im Leben Leopold Blooms in Dublin und spiegelt dabei Homers <a class='ilink' data-s='odyssee'>Odyssee</a>.</p><p>Berühmt für den <b>Bewusstseinsstrom</b> (stream of consciousness) und ständig wechselnde Stile, gilt der Roman als eines der einflussreichsten Werke der Moderne. Der 'Bloomsday' feiert ihn bis heute weltweit.</p>"},{"slug":"hundert-jahre-einsamkeit","title":"Hundert Jahre Einsamkeit","crumb":"Werke › Weltliteratur","body":"<p><b>Hundert Jahre Einsamkeit</b> (1967) von <a class='ilink' data-s='garcia-marquez'>Gabriel García Márquez</a> erzählt über sieben Generationen die Geschichte der Familie Buendía und des Dorfes Macondo.</p><p>Der Roman ist das Hauptwerk des <b>magischen Realismus</b>, in dem Wunderbares selbstverständlich in den Alltag eingebettet ist. Macondo steht sinnbildlich für Lateinamerika; 1982 erhielt García Márquez den Nobelpreis.</p>"},{"slug":"die-pest","title":"Die Pest","crumb":"Werke › Weltliteratur","body":"<p><b>Die Pest</b> (1947) von <a class='ilink' data-s='camus'>Albert Camus</a> schildert den Ausbruch der Seuche in der abgeriegelten Stadt Oran und den Kampf des Arztes Rieux dagegen.</p><p>Zugleich Chronik und Parabel, steht die Pest oft für das Böse (etwa den Faschismus). Zentral ist Camus' Ethik der <b>Revolte</b>: konkrete Solidarität und Anstand gegen sinnloses Leid. Während der COVID-19-Pandemie wurde der Roman neu zum Bestseller.</p>"},{"slug":"faenger-im-roggen","title":"Der Fänger im Roggen","crumb":"Werke › Weltliteratur","body":"<p><b>Der Fänger im Roggen</b> (1951) von <a class='ilink' data-s='salinger'>J. D. Salinger</a> folgt dem 16-jährigen Holden Caulfield durch New York und seiner Wut auf die 'verlogene' Erwachsenenwelt.</p><p>Im jugendlichen Slang erzählt, wurde der Roman zur Kultstimme adoleszenter Entfremdung – und wegen seiner Sprache lange von Schulen zensiert.</p>"},{"slug":"kabale-und-liebe","title":"Kabale und Liebe","crumb":"Werke › Deutschland","body":"<p><b>Kabale und Liebe</b> (1784) von <a class='ilink' data-s='schiller'>Friedrich Schiller</a> ist ein 'bürgerliches Trauerspiel': Die Liebe des adligen Ferdinand zur bürgerlichen Luise scheitert an höfischer Intrige und Standesschranken.</p><p>Das Stück klagt Machtmissbrauch des Adels und die Enge der Ständeordnung an und pocht auf die Würde des Einzelnen – ein Klassiker des Sturm und Drang.</p>"},{"slug":"joyce","title":"James Joyce","crumb":"Autoren","body":"<p><b>James Joyce</b> (1882–1941) war ein irischer Schriftsteller und einer der wichtigsten Erneuerer des Romans. Neben <a class='ilink' data-s='ulysses'>Ulysses</a> schrieb er die 'Dubliner' und das extrem experimentelle 'Finnegans Wake'. Er lebte lange im europäischen Exil.</p>"},{"slug":"garcia-marquez","title":"Gabriel García Márquez","crumb":"Autoren","body":"<p><b>Gabriel García Márquez</b> (1927–2014) war ein kolumbianischer Autor und Nobelpreisträger (1982), die Leitfigur des magischen Realismus. Sein Hauptwerk ist <a class='ilink' data-s='hundert-jahre-einsamkeit'>Hundert Jahre Einsamkeit</a>.</p>"},{"slug":"salinger","title":"J. D. Salinger","crumb":"Autoren","body":"<p><b>J. D. Salinger</b> (1919–2010) wurde mit <a class='ilink' data-s='faenger-im-roggen'>Der Fänger im Roggen</a> weltberühmt, lebte danach aber jahrzehntelang extrem zurückgezogen und mied jede Öffentlichkeit.</p>"},{"slug":"karamasow","title":"Die Brüder Karamasow","crumb":"Werke › Russland","body":"<p>In <a class='ilink' data-s='dostojewski'>Dostojewskis</a> letztem Roman <b>Die Brüder Karamasow</b> (1880) zerbricht eine Familie am Streit um Geld, Leidenschaft und Glauben, bis der Vater ermordet wird. Die drei Brüder – der sinnliche Dmitri, der zweifelnde Iwan und der gläubige Aljoscha – verkörpern die widerstreitenden Kräfte des Menschen.</p><p>Berühmt sind die Parabel vom <b>Großinquisitor</b> und Iwans Gedanke, ohne Gott sei ‚alles erlaubt‘. Wie <a class='ilink' data-s='schuld-und-suehne'>Schuld und Sühne</a> verbindet Dostojewski Kriminalfall und Religionsphilosophie zu einem Höhepunkt des russischen Realismus.</p>"},{"slug":"moby-dick","title":"Moby-Dick","crumb":"Werke › USA","body":"<p><a class='ilink' data-s='melville'>Herman Melvilles</a> <b>Moby-Dick</b> (1851) erzählt von Kapitän Ahab, der besessen den weißen Wal jagt, der ihm ein Bein abriss. Erzähler Ismael berichtet vom Untergang des Walfängers ‚Pequod‘.</p><p>Der weiße Wal ist vieldeutig – Naturgewalt, Schicksal, das unerkennbare Absolute. Melville mischt Abenteuer, Drama und Sachkapitel zu einem der größten amerikanischen Romane, der erst im 20. Jahrhundert neu entdeckt wurde.</p>"},{"slug":"berlin-alexanderplatz","title":"Berlin Alexanderplatz","crumb":"Werke › Deutschland","body":"<p><a class='ilink' data-s='doeblin'>Alfred Döblins</a> <b>Berlin Alexanderplatz</b> (1929) folgt dem Ex-Häftling Franz Biberkopf, der in der Großstadt anständig bleiben will und doch immer wieder ins Verbrechen gerissen wird.</p><p>In einer <b>Montage</b> aus Werbeslogans, Zeitungsfetzen und Bibelanspielungen wird Berlin selbst zur Hauptfigur. Der Roman gilt – ähnlich wie <a class='ilink' data-s='ulysses'>Ulysses</a> – als Höhepunkt der modernen Großstadtliteratur.</p>"},{"slug":"wilhelm-tell","title":"Wilhelm Tell","crumb":"Werke › Deutschland","body":"<p><a class='ilink' data-s='schiller'>Schillers</a> letztes Drama <b>Wilhelm Tell</b> (1804) zeigt den Freiheitskampf der Schweizer Urkantone gegen die habsburgischen Vögte. Als Landvogt Gessler den Jäger Tell zwingt, einen Apfel vom Kopf seines Sohnes zu schießen, wird aus dem Einzelgänger ein Rächer.</p><p>Tells Notwehr und der gemeinschaftliche Rütlischwur stehen für zwei Wege des Widerstands. Wie <a class='ilink' data-s='die-raeuber'>Die Räuber</a> und <a class='ilink' data-s='kabale-und-liebe'>Kabale und Liebe</a> verhandelt Schiller die Spannung von Recht, Macht und Freiheit.</p>"},{"slug":"nathan","title":"Nathan der Weise","crumb":"Werke › Deutschland","body":"<p><a class='ilink' data-s='lessing'>Lessings</a> <b>Nathan der Weise</b> (1779) spielt im Jerusalem der Kreuzzugszeit, wo sich Jude, Muslim und Christ begegnen. Auf die Frage nach der wahren Religion antwortet Nathan mit der <b>Ringparabel</b>.</p><p>Da niemand den echten Ring beweisen kann, zählt allein gelebte Güte und Toleranz. Das Ideendrama der Aufklärung wirbt für Vernunft und Menschlichkeit über alle Konfessionsgrenzen hinweg.</p>"},{"slug":"der-untertan","title":"Der Untertan","crumb":"Werke › Deutschland","body":"<p><a class='ilink' data-s='heinrich-mann'>Heinrich Manns</a> Satire <b>Der Untertan</b> (1918) zeichnet Diederich Heßling, der im Kaiserreich nach oben buckelt und nach unten tritt. An seinem Aufstieg entlarvt der Roman den autoritären Untertanengeist.</p><p>Die Phrasen von Nation und Ehre erweisen sich als Deckmantel für Feigheit und Egoismus. Viele lesen den Roman als prophetische Analyse der Mentalität, die Krieg und Diktatur ermöglichte.</p>"},{"slug":"sturmhoehe","title":"Sturmhöhe","crumb":"Werke › England","body":"<p><a class='ilink' data-s='bronte'>Emily Brontës</a> einziger Roman <b>Sturmhöhe</b> (1847) schildert die leidenschaftliche, zerstörerische Liebe zwischen dem Findelkind Heathcliff und Catherine in der rauen Moorlandschaft Yorkshires.</p><p>Zurückgewiesen, kehrt Heathcliff als reicher Mann zurück und rächt sich über zwei Generationen. Die entgrenzte Leidenschaft jenseits von Moral machte das düstere Werk zum Klassiker der englischen Literatur.</p>"},{"slug":"grosse-erwartungen","title":"Große Erwartungen","crumb":"Werke › England","body":"<p><a class='ilink' data-s='dickens'>Charles Dickens’</a> <b>Große Erwartungen</b> (1861) erzählt vom Waisen Pip, der durch einen unbekannten Gönner zu Vermögen kommt und sich beschämt von seiner einfachen Herkunft abwendet.</p><p>Am Ende erweist sich der verachtete Sträfling Magwitch als sein Wohltäter. Der Entwicklungsroman entlarvt die Standesdünkel der viktorianischen Gesellschaft und die Illusion, Geld mache zum besseren Menschen.</p>"},{"slug":"meister-und-margarita","title":"Der Meister und Margarita","crumb":"Werke › Russland","body":"<p><a class='ilink' data-s='bulgakow'>Michail Bulgakows</a> <b>Der Meister und Margarita</b> (postum 1966/67) lässt den Teufel als Professor Woland im atheistischen Moskau der Stalinzeit Chaos stiften – begleitet von einem riesigen sprechenden Kater.</p><p>Verwoben ist die Geschichte eines verfemten Schriftstellers und ein Roman über Pontius Pilatus. Die Satire auf Zensur und Bürokratie (‚Manuskripte brennen nicht‘) wurde zum Kultbuch künstlerischer Freiheit.</p>"},{"slug":"monte-christo","title":"Der Graf von Monte Christo","crumb":"Werke › Frankreich","body":"<p><a class='ilink' data-s='dumas'>Alexandre Dumas’</a> <b>Der Graf von Monte Christo</b> (1844) erzählt von Edmond Dantès, der unschuldig ins Verlies geworfen wird, entkommt und als sagenhaft reicher Graf zurückkehrt, um sich an seinen Verrätern zu rächen.</p><p>Der Abenteuerroman verhandelt Verrat, Rache und die Frage, ob ein Mensch göttliche Gerechtigkeit selbst vollstrecken darf. Sein Schlusswort lautet: ‚warten und hoffen‘.</p>"},{"slug":"melville","title":"Herman Melville","crumb":"Autoren","body":"<p><b>Herman Melville</b> (1819–1891) war ein US-amerikanischer Schriftsteller, der selbst jahrelang auf Walfangschiffen fuhr. Diese Erfahrung floss in sein Hauptwerk <a class='ilink' data-s='moby-dick'>Moby-Dick</a> ein.</p><p>Zu Lebzeiten verkannt, starb Melville fast vergessen. Erst im 20. Jahrhundert wurde er als einer der größten amerikanischen Erzähler wiederentdeckt.</p>"},{"slug":"doeblin","title":"Alfred Döblin","crumb":"Autoren","body":"<p><b>Alfred Döblin</b> (1878–1957) war Arzt und Schriftsteller in Berlin. Sein Großstadtroman <a class='ilink' data-s='berlin-alexanderplatz'>Berlin Alexanderplatz</a> gilt als Höhepunkt der Neuen Sachlichkeit.</p><p>Als Jude und Sozialist emigrierte er 1933. Seine Montagetechnik machte ihn zum deutschen Pionier des modernen Erzählens.</p>"},{"slug":"lessing","title":"Gotthold Ephraim Lessing","crumb":"Autoren","body":"<p><b>Gotthold Ephraim Lessing</b> (1729–1781) war der wichtigste Dichter und Denker der deutschen Aufklärung. Sein Toleranzdrama <a class='ilink' data-s='nathan'>Nathan der Weise</a> ist bis heute Schulstoff.</p><p>Als Dramatiker, Kritiker und Theoretiker prägte er das deutsche Theater und stritt für Vernunft und Humanität.</p>"},{"slug":"heinrich-mann","title":"Heinrich Mann","crumb":"Autoren","body":"<p><b>Heinrich Mann</b> (1871–1950), älterer Bruder von <a class='ilink' data-s='thomas-mann'>Thomas Mann</a>, war überzeugter Demokrat. Seine Satire <a class='ilink' data-s='der-untertan'>Der Untertan</a> kritisiert den Obrigkeitsstaat des Kaiserreichs.</p><p>1933 emigrierte er und blieb ein scharfer Gegner des Nationalsozialismus.</p>"},{"slug":"bronte","title":"Emily Brontë","crumb":"Autoren","body":"<p><b>Emily Brontë</b> (1818–1848) war eine der drei schreibenden Brontë-Schwestern in Yorkshire. Ihr einziger Roman <a class='ilink' data-s='sturmhoehe'>Sturmhöhe</a> erschien 1847 unter männlichem Pseudonym.</p><p>Sie starb jung, ohne den späteren Weltruhm ihres Werks zu erleben.</p>"},{"slug":"dickens","title":"Charles Dickens","crumb":"Autoren","body":"<p><b>Charles Dickens</b> (1812–1870) war der populärste englische Romancier der viktorianischen Zeit. Werke wie <a class='ilink' data-s='grosse-erwartungen'>Große Erwartungen</a> erschienen zunächst als Fortsetzungsromane.</p><p>Aus eigener Erfahrung mit Armut prangerte er soziale Missstände an und schuf unvergessliche Figuren.</p>"},{"slug":"bulgakow","title":"Michail Bulgakow","crumb":"Autoren","body":"<p><b>Michail Bulgakow</b> (1891–1940) war ein russischer Schriftsteller, dessen Werk unter Stalin weitgehend unterdrückt wurde. An <a class='ilink' data-s='meister-und-margarita'>Der Meister und Margarita</a> arbeitete er bis zu seinem Tod.</p><p>Der Roman erschien erst Jahrzehnte später und wurde zu einem Kultbuch der russischen Literatur.</p>"},{"slug":"dumas","title":"Alexandre Dumas","crumb":"Autoren","body":"<p><b>Alexandre Dumas</b> (1802–1870) war ein französischer Erzähler und Meister des Abenteuerromans. Neben <a class='ilink' data-s='monte-christo'>Der Graf von Monte Christo</a> schuf er auch ‚Die drei Musketiere‘.</p><p>Er arbeitete mit Zuträgern zusammen und zählt zu den meistgelesenen Autoren der Weltliteratur.</p>"},{"slug":"quellen","title":"Quellen & Hinweis","crumb":"Service","body":"<p>Die Werkauswahl orientiert sich u. a. am <b>dtv-Literaturkanon</b>, an 'Die besten aller Zeiten' (Klassiker der Weltliteratur) und an der buchtipp.de-Liste '100 beste Bücher'.</p><p>Alle Zusammenfassungen, Deutungen und Einordnungen sind eigenständig formuliert. Es werden bewusst <b>keine urheberrechtlich geschützten Originalzitate</b> wiedergegeben.</p>"}],"tree":[{"name":"Grundlagen","ic":"🗺️","slugs":["ueberblick"],"subs":[]},{"name":"Werke","ic":"📖","slugs":[],"subs":[{"name":"Deutschland","slugs":["faust","werther","buddenbrooks","zauberberg","effi-briest","blechtrommel","homo-faber","tod-in-venedig","steppenwolf","die-raeuber","im-westen-nichts-neues","das-parfum","der-vorleser","kabale-und-liebe","berlin-alexanderplatz","wilhelm-tell","nathan","der-untertan"]},{"name":"Weltliteratur","slugs":["schuld-und-suehne","stolz-und-vorurteil","1984","der-fremde","don-quijote","anna-karenina","madame-bovary","krieg-und-frieden","der-grosse-gatsby","odyssee","hamlet","goettliche-komoedie","frankenstein","ulysses","hundert-jahre-einsamkeit","die-pest","faenger-im-roggen","karamasow","moby-dick","sturmhoehe","grosse-erwartungen","meister-und-margarita","monte-christo"]},{"name":"Moderne","slugs":["verwandlung","prozess"]}]},{"name":"Autoren","ic":"🧠","slugs":["goethe","kafka","dostojewski","austen","orwell","camus","thomas-mann","fontane","grass","cervantes","tolstoi","flaubert","max-frisch","hesse","schiller","fitzgerald","remarque","sueskind","homer","shakespeare","dante","mary-shelley","schlink","joyce","garcia-marquez","salinger","melville","doeblin","lessing","heinrich-mann","bronte","dickens","bulgakow","dumas"],"subs":[]},{"name":"Service","ic":"📚","slugs":["quellen"],"subs":[]}],"catIcons":{}};
var root=document.documentElement;
// ---- theme ----
function initTheme(){var p=new URLSearchParams(location.search).get('theme');var t;
  if(p==='dark'||p==='light')t=p;else{try{t=localStorage.getItem('nsw_theme')||'light'}catch(e){t='light'}}
  applyTheme(t);}
function applyTheme(t){if(t==='dark'){root.setAttribute('data-theme','dark');}else{root.removeAttribute('data-theme');}
  document.getElementById('themebtn').textContent=(t==='dark')?'☀️':'🌙';curTheme=t;
  // update any embedded aroma iframe
  var af=document.querySelector('.aromaframe');if(af){var u=af.getAttribute('data-base');af.src=u+'?theme='+t;}}
var curTheme='light';
document.getElementById('themebtn').onclick=function(){var t=curTheme==='dark'?'light':'dark';try{localStorage.setItem('nsw_theme',t)}catch(e){}applyTheme(t);};
// ---- index ----
var BYSLUG={};APP.articles.forEach(function(a){BYSLUG[a.slug]=a;});
document.title=APP.title+' – Nachschlagewerk';
document.getElementById('brand').innerHTML=APP.brand;
document.getElementById('logo').textContent=APP.ic;
root.style.setProperty('--brand',APP.color);
var meta=document.createElement('meta');meta.name='theme-color';meta.content=APP.color;document.head.appendChild(meta);
// ---- sidebar ----
function buildSidebar(){
  var side=document.getElementById('side');side.innerHTML='';
  APP.tree.forEach(function(c,ci){
    var cat=document.createElement('div');cat.className='cat'+(ci>0?' collapsed':'');
    var btn=document.createElement('button');btn.className='catname';btn.innerHTML=(c.ic?c.ic+' ':'')+c.name+'<span class="tw">▾</span>';
    btn.onclick=function(){cat.classList.toggle('collapsed');};
    cat.appendChild(btn);
    var ch=document.createElement('div');ch.className='children';
    (c.slugs||[]).forEach(function(s){ch.appendChild(mkA(s));});
    (c.subs||[]).forEach(function(sub){
      var sn=document.createElement('div');sn.className='subname';sn.textContent=sub.name;ch.appendChild(sn);
      sub.slugs.forEach(function(s){ch.appendChild(mkA(s));});
    });
    cat.appendChild(ch);side.appendChild(cat);
  });
}
function mkA(slug){var a=BYSLUG[slug];var b=document.createElement('button');b.className='alink';b.dataset.s=slug;b.textContent=a?a.title:slug;b.onclick=function(){go(slug);closeSide();};return b;}
// ---- article render ----
function go(slug){
  var a=BYSLUG[slug];if(!a){a=APP.articles[0];slug=a.slug;}
  if(location.hash!=='#'+slug)history.replaceState(null,'','#'+slug);
  document.querySelectorAll('.alink').forEach(function(x){x.classList.toggle('active',x.dataset.s===slug);});
  // expand the cat containing it
  var m=document.getElementById('main');
  var sa="";
  m.innerHTML='<div class="crumb">'+a.crumb+'</div><article class="art"><h1>'+a.title+'</h1>'+a.body+sa+'</article>';
  m.scrollTop=0;window.scrollTo(0,0);
  // wire internal links
  m.querySelectorAll('a.ilink').forEach(function(l){l.onclick=function(e){e.preventDefault();go(l.dataset.s);};});
  m.querySelectorAll('.seealso a').forEach(function(l){l.onclick=function(e){e.preventDefault();go(l.dataset.s);};});
}
function relatedChips(slug){
  var a=BYSLUG[slug];if(!a.rel||!a.rel.length)return '';
  var c=a.rel.map(function(s){var t=BYSLUG[s];return t?'<a data-s="'+s+'">'+t.title+'</a>':'';}).join('');
  return '<div class="seealso"><b>Siehe auch</b><div class="chips">'+c+'</div></div>';
}
// ---- search ----
function strip(s){return (s||'').replace(/<[^>]+>/g,' ');}
document.getElementById('search').addEventListener('input',function(e){
  var q=e.target.value.trim().toLowerCase();
  if(!q){var h=location.hash.slice(1);go(BYSLUG[h]?h:APP.articles[0].slug);return;}
  var hits=APP.articles.filter(function(a){return (a.title+' '+strip(a.body)).toLowerCase().indexOf(q)>-1;}).slice(0,40);
  var m=document.getElementById('main');
  m.innerHTML='<div class="crumb">Suche</div><h1 class="art" style="font-size:24px;margin:0 0 14px">'+hits.length+' Treffer für „'+e.target.value+'"</h1><div class="results"></div>';
  var box=m.querySelector('.results');
  hits.forEach(function(a){var b=document.createElement('button');b.className='alink';b.dataset.s=a.slug;b.textContent=a.title;b.onclick=function(){go(a.slug);};box.appendChild(b);});
  if(!hits.length)m.querySelector('.results').innerHTML='<p class="muted">Nichts gefunden.</p>';
});
// ---- mobile ----
function closeSide(){document.getElementById('side').classList.remove('open');document.getElementById('backdrop').classList.remove('open');}
document.getElementById('menubtn').onclick=function(){document.getElementById('side').classList.toggle('open');document.getElementById('backdrop').classList.toggle('open');};
document.getElementById('backdrop').onclick=closeSide;
// ---- init ----
document.getElementById('logo').onclick=function(){go(APP.articles[0].slug);closeSide();};
initTheme();buildSidebar();
var start=location.hash.slice(1);go(BYSLUG[start]?start:APP.articles[0].slug);
window.addEventListener('hashchange',function(){var h=location.hash.slice(1);if(h&&BYSLUG[h])go(h);});
</script>
